# ===========================================
# LucidByte - Конфигурационный Файл
# ===========================================

application:
  name: "LucidByte"
  version: "1.0.0"
  theme: "dark"

analysis:
  decompiler_path: ""
  temp_directory: "temp"
  enable_ghidra: true
  enable_signature_scan: true

security:
  suspicious_permissions:
    - "READ_SMS"
    - "SEND_SMS"
    - "READ_CONTACTS"
    - "ACCESS_FINE_LOCATION"
  dangerous_api_calls:
    - "Runtime.exec"
    - "DexClassLoader"
    - "ProcessBuilder"
  risk_threshold: 70

# ✅  Только открытые источники сигнатур
signatures:
  sources:
    malwarebazaar: "https://bazaar.abuse.ch/export/"
    yara_rules:
      - "https://raw.githubusercontent.com/Yara-Rules/rules/master/"
      - "https://raw.githubusercontent.com/elastic/protections-artifacts/main/yara-rules/"
      - "https://raw.githubusercontent.com/Neo23x0/signature-base/master/yara/"
  
  update_interval_hours: 24
  fuzzy_hash_threshold: 90
  enable_sha256_scan: true
  enable_yara_scan: true
  enable_ssdeep_scan: true
  virustotal_api_key: ""
  
  http_proxy: ""
  https_proxy: ""

language_model:
  base_url: "http://localhost:11434"
  model_name: "llama2"