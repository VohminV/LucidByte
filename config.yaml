application:
  name: LucidByte
  version: 3.0.0
  mode: android_malware_analysis
  theme: dark

language_model:
  provider: ollama
  model_name: qwen2.5-coder:7b
  base_url: http://localhost:11434
  max_tokens: 4096
  temperature: 0.1

analysis:
  decompiler_path: jadx
  temp_directory: temp
  max_file_size_mb: 100
  enable_deep_scan: true
  enable_dynamic_analysis: true
  enable_native_analysis: true

security:
  risk_threshold: 5
  suspicious_permissions:
    - SEND_SMS
    - READ_SMS
    - RECEIVE_SMS
    - READ_CONTACTS
    - WRITE_CONTACTS
    - ACCESS_FINE_LOCATION
    - ACCESS_COARSE_LOCATION
    - READ_CALL_LOG
    - WRITE_CALL_LOG
    - PROCESS_OUTGOING_CALLS
    - RECEIVE_BOOT_COMPLETED
    - SYSTEM_ALERT_WINDOW
    - BIND_ACCESSIBILITY_SERVICE
    - DEVICE_POWER
    - WAKE_LOCK
    - READ_EXTERNAL_STORAGE
    - WRITE_EXTERNAL_STORAGE
    - CAMERA
    - RECORD_AUDIO
    - GET_ACCOUNTS
    - USE_CREDENTIALS
  dangerous_api_calls:
    - Runtime.exec
    - ProcessBuilder
    - HttpURLConnection
    - SSLSocket
    - Cipher.getInstance
    - SecretKeySpec
    - SmsManager.getDefault
    - TelephonyManager
    - AudioManager
    - Camera.open
    - LocationManager
    - AccountManager
    - ClipboardManager
    - WifiManager
    - BluetoothAdapter
    - DexClassLoader
    - PathClassLoader

sandbox:
  emulator_path: emulator
  emulator_port: 5554
  frida_server_port: 27042
  mitmproxy_port: 8080
  capture_timeout_seconds: 60

native_analysis:
  enable_ghidra: true
  ghidra_path: ghidra
  enable_capstone: true
  architectures:
    - arm
    - arm64
    - x86
    - x86_64

deobfuscation:
  enable_auto_rename: true
  enable_string_decryption: true
  enable_flow_simplification: true
  max_iterations: 5

interface:
  width: 1920
  height: 1080
  font_size: 12
  show_line_numbers: true
  enable_syntax_highlighting: true